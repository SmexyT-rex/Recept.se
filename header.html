<header
  class="sticky top-0 w-full z-50 bg-white/80 dark:bg-stone-900/80 backdrop-blur-md border-b border-stone-200/20 dark:border-stone-800/20 shadow-sm dark:shadow-none transition-all duration-300"
>
  <div
    class="flex flex-col items-center w-full max-w-screen-2xl mx-auto px-6 py-4"
  >
    <!-- Top Tier: Logo centered & Mobile Trigger -->
    <div
      class="w-full flex items-center justify-between md:justify-center py-2 relative"
    >
      <!-- Mobile Menu Button (Visible only on small screens) -->
      <button
        aria-label="Open Menu"
        class="md:hidden flex items-center p-2 -ml-2 text-stone-900 dark:text-stone-50"
        id="menu-open"
      >
        <span class="material-symbols-outlined text-3xl">menu</span>
      </button>
      <a
        class="text-2xl md:text-4xl font-black tracking-tighter text-stone-900 dark:text-stone-50 uppercase font-headline text-center"
        href="#"
      >
        The Gastronomic Editorial
      </a>
      <!-- Mobile Action (Visible only on small screens) -->
      <button
        aria-label="Add Recipe"
        class="md:hidden flex items-center bg-primary text-white p-2 rounded-full hover:scale-105 transition-transform"
      >
        <span class="material-symbols-outlined text-sm">add</span>
      </button>
    </div>
    <!-- Bottom Tier: Navigation & Actions (Desktop Only) -->
    <div
      class="hidden md:flex w-full flex-row items-center justify-between mt-4 pt-4 border-t border-stone-100 dark:border-stone-800/50"
    >
      <nav
        class="flex items-center gap-8 font-['Epilogue'] tracking-tight text-sm"
      >
        <a
          class="text-[18px] text-[#b51c00] dark:text-[#ff3007] font-bold border-b-2 border-[#b51c00] pb-1 transition-all duration-200"
          href="#"
          >Home</a
        >
        <a
          class="text-[18px] text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-200 transition-colors"
          href="#"
          >Categories</a
        >
        <a
          class="text-[18px] text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-200 transition-colors"
          href="#"
          >Favorites</a
        >
      </nav>

      <div class="flex items-center gap-6">
        <button
          class="bg-[#b51c00] text-white px-8 py-2.5 rounded-full font-headline font-bold uppercase text-xs tracking-widest hover:opacity-90 active:scale-95 transition-all duration-200"
        >
          Add Recipe
        </button>

        <button
          class="log-in bg-transparent text-[#b51c00] border-[#b51c00] border-2 px-8 py-2 rounded-full font-headline font-bold uppercase text-xs tracking-widest hover:bg-[#b51c00] hover:text-white active:scale-95 transition-all duration-200 box-content"
        >
          Log in
        </button>
      </div>
    </div>
  </div>
</header>
